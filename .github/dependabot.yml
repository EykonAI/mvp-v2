# Dependabot config for EykonAI/mvp-v2.
# Two npm ecosystems: the workspace root + apps/web.
# Weekly schedule. Minor/patch updates grouped per ecosystem;
# majors and security updates get their own PRs.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # ── Root workspace (supervisor + ais-ingest scripts)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      root-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # ── Next.js web app
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps,web)"
    groups:
      web-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
