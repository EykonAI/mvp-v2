# Dependabot config for EykonAI/mvp-v2.
# Two npm ecosystems: the workspace root + apps/web.
# Weekly schedule (Monday). Minor/patch updates grouped per ecosystem;
# majors and security updates get their own PRs.
#
# IGNORE LIST: pre-1.0 packages where "minor" semver bumps are
# effectively breaking. The package's API contract isn't stable yet,
# so what looks like a routine patch can rewrite types or rename
# props. These are upgraded manually as deliberate migrations, not
# via auto-grouping.
#
# Lesson learned the hard way: PR #68 grouped @anthropic-ai/sdk
# 0.32.1 → 0.95.1 into a "minor-patch" group, which broke type-check
# across api/chat, api/user_queries, api/intel/briefing, etc. The pin
# in PR #75 restored main; this config prevents recurrence.
#
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # ── Root workspace (ais-ingest script)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Block ALL major version updates across every package. Major
      # bumps are deliberate migrations — they ship as their own
      # carefully-tested PRs, never as routine auto-updates. Security
      # updates still flow through normally (they bypass the
      # version-update filter).
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Pre-1.0 packages — manual migration only (full block including
      # security). For these, even "minor" bumps are effectively
      # breaking, and security updates would still attempt cross-major
      # jumps that we want to vet manually.
      - dependency-name: "@anthropic-ai/sdk"
      - dependency-name: "zod"
      - dependency-name: "react-map-gl"
      - dependency-name: "recharts"
      - dependency-name: "lucide-react"
      # Next.js — full block (no security PRs either). Auto-PR #74
      # tried to security-update 14 → 15 and failed due to React 19
      # peer-dep cascade. The next migration ships as deliberate work
      # post-launch, not via Dependabot.
      - dependency-name: "next"
    groups:
      root-minor-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "@anthropic-ai/sdk"
          - "zod"
          - "react-map-gl"
          - "recharts"
          - "lucide-react"
          - "next"
        update-types:
          - "minor"
          - "patch"

  # ── Next.js web app
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps,web)"
    ignore:
      # Block ALL major version updates across every package. Major
      # bumps are deliberate migrations — they ship as their own
      # carefully-tested PRs, never as routine auto-updates. Security
      # updates still flow through normally (they bypass the
      # version-update filter).
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Pre-1.0 packages — manual migration only (full block including
      # security). For these, even "minor" bumps are effectively
      # breaking, and security updates would still attempt cross-major
      # jumps that we want to vet manually.
      - dependency-name: "@anthropic-ai/sdk"
      - dependency-name: "zod"
      - dependency-name: "react-map-gl"
      - dependency-name: "recharts"
      - dependency-name: "lucide-react"
      # Next.js — full block (no security PRs either). Auto-PR #74
      # tried to security-update 14 → 15 and failed due to React 19
      # peer-dep cascade. The next migration ships as deliberate work
      # post-launch, not via Dependabot.
      - dependency-name: "next"
    groups:
      web-minor-patch:
        patterns:
          - "*"
        exclude-patterns:
          - "@anthropic-ai/sdk"
          - "zod"
          - "react-map-gl"
          - "recharts"
          - "lucide-react"
          - "next"
        update-types:
          - "minor"
          - "patch"
